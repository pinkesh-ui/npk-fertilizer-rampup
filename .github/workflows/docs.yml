name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Docs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyyaml mkdocs==1.5.3 mkgendocs==0.9.2

      - name: Autogenerate documentation
        continue-on-error: true
        run: |
          python automate_mkdocs.py || true
          gendocs --config mkgendocs.yml || true
          mkdocs build --verbose || true

      - name: Deploy GitHub Pages
        # Requires repo Settings → Pages and write permissions; do not fail the whole CI.
        continue-on-error: true
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force --clean --verbose || true
